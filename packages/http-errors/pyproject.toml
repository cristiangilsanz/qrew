[project]
name = "http-errors"
version = "0.1.0"
description = "Qrew http errors."
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.110",
    "pydantic>=2.0",
    "slowapi>=0.1.9",
    "structlog>=24.0",
]

[tool.uv]
venvPath = "../.."
venv = ".venv"

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
include = ["src"]
