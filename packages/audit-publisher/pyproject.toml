[project]
name = "audit-publisher"
version = "0.1.0"
description = "Qrew audit publisher."
requires-python = ">=3.12"
dependencies = [
    "structlog>=24.0",
    "contracts",
    "broker",
]

[tool.uv.sources]
contracts = { workspace = true }
broker = { workspace = true }

[tool.uv]
venvPath = "../.."
venv = ".venv"

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
include = ["src"]
