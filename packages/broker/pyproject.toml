[project]
name = "broker"
version = "0.1.0"
description = "Qrew broker."
requires-python = ">=3.12"
dependencies = [
    "nats-py>=2.7",
    "structlog>=24.1",
    "contracts",
]

[tool.uv.sources]
contracts = { workspace = true }

[tool.uv]
venvPath = "../.."
venv = ".venv"

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
include = ["src"]
