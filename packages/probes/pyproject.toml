[project]
name = "probes"
version = "0.1.0"
description = "Qrew probes."
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.110",
    "redis[asyncio]>=5.0",
    "sqlalchemy>=2.0",
]

[tool.uv]
venvPath = "../.."
venv = ".venv"

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
include = ["src"]
