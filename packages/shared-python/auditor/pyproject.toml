[project]
name = "auditor"
version = "0.1.0"
description = "Qrew audit event publisher."
requires-python = ">=3.12"
dependencies = [
    "structlog>=24.0",
    "contracts",
    "messaging",
]

[tool.uv.sources]
contracts = { workspace = true }
messaging = { workspace = true }

[tool.uv]
venvPath = "../.."
venv = ".venv"

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["src", "../contracts/src", "../shared-python/messaging/src"]
python_files = ["*_test.py"]

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
include = ["src"]
reportMissingTypeStubs = false
