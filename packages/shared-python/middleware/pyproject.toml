[project]
name = "middleware"
version = "0.1.0"
description = "Starlette middlewares for request ID propagation and security headers"
requires-python = ">=3.12"
dependencies = [
    "starlette>=0.40",
    "structlog>=24.1",
]

[tool.uv]
venvPath = "../../.."
venv = ".venv"

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
include = ["src"]
reportMissingTypeStubs = false
