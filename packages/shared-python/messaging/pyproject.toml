[project]
name = "messaging"
version = "0.1.0"
description = "NATS messaging client, publisher and subscriber"
requires-python = ">=3.12"
dependencies = [
    "nats-py>=2.7",
    "structlog>=24.1",
    "contracts",
]

[tool.uv]
venvPath = "../../.."
venv = ".venv"

[tool.uv.sources]
contracts = { workspace = true }

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
include = ["src"]
reportMissingTypeStubs = false
