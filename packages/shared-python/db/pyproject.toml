[project]
name = "db"
version = "0.1.0"
description = "Redis connection utilities and FastAPI dependency factories"
requires-python = ">=3.12"
dependencies = [
    "redis[asyncio,hiredis]>=5.0",
]

[tool.uv]
venvPath = "../../.."
venv = ".venv"

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
include = ["src"]
reportMissingTypeStubs = false

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["src"]
python_files = ["*_test.py"]
