[project]
name = "exceptions"
version = "0.1.0"
description = "FastAPI exception handlers and standardised error response models"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "pydantic>=2.0",
    "structlog>=24.1",
    "slowapi>=0.1.9",
    "starlette>=0.40",
]

[tool.uv]
venvPath = "../../.."
venv = ".venv"

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
include = ["src"]
reportMissingTypeStubs = false
