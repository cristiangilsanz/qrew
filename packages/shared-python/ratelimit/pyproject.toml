[project]
name = "ratelimit"
version = "0.1.0"
description = "Sliding-window rate limiter backed by Redis with FastAPI decorator support"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "starlette>=0.40",
    "redis[asyncio,hiredis]>=5.0",
    "structlog>=24.1",
    "slowapi>=0.1.9",
]

[tool.uv]
venvPath = "../../.."
venv = ".venv"

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
include = ["src"]
reportMissingTypeStubs = false

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["src"]
python_files = ["*_test.py"]
