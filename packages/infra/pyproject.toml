[project]
name = "infra"
version = "0.1.0"
description = "Shared infrastructure primitives — database, Redis, locking, middleware"
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "redis[asyncio]>=5.0",
    "structlog>=24.0",
    "starlette>=0.40",
    "arq>=0.26",
]

[tool.uv.sources]

[tool.uv]
venvPath = "../.."
venv = ".venv"

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
include = ["src"]
