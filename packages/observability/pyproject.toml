[project]
name = "observability"
version = "0.1.0"
description = "Shared OpenTelemetry tracing, log correlation, and context propagation"
requires-python = ">=3.12"
dependencies = [
    "opentelemetry-sdk>=1.20",
    "opentelemetry-exporter-otlp-proto-grpc>=1.20",
    "opentelemetry-instrumentation-fastapi>=0.40b0",
    "opentelemetry-instrumentation-httpx>=0.40b0",
    "opentelemetry-instrumentation-redis>=0.40b0",
    "opentelemetry-instrumentation-sqlalchemy>=0.40b0",
    "structlog>=24.0",
    "fastapi>=0.115",
]

[tool.uv.sources]

[tool.uv]
venvPath = "../.."
venv = ".venv"

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
include = ["src"]
