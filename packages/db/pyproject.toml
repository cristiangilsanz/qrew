[project]
name = "db"
version = "0.1.0"
description = "Qrew db."
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.29",
    "redis[asyncio,hiredis]>=5.0",
    "arq>=0.26",
]

[tool.uv.sources]

[tool.uv]
venvPath = "../.."
venv = ".venv"

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
include = ["src"]
