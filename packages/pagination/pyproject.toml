[project]
name = "pagination"
version = "0.1.0"
description = "Shared keyset pagination utilities — page model and cursor encoding"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "fastapi>=0.115",
    "sqlalchemy[asyncio]>=2.0",
]

[tool.uv.sources]

[tool.uv]
venvPath = "../.."
venv = ".venv"

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "strict"
include = ["src"]
