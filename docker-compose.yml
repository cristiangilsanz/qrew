services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sekret
      POSTGRES_DB: qrew
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qrew"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  identity:
    build:
      context: .
      dockerfile: apps/api/services/identity/Dockerfile
    volumes:
      - ./apps/api/services/identity/config/local.yaml:/app/config/local.yaml:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:sekret@postgres:5432/qrew
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      HOST: 0.0.0.0
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  identity-worker:
    build:
      context: .
      dockerfile: apps/api/services/identity/Dockerfile
    command: ["python", "-m", "com.qode.qrew.v1.identity.worker"]
    volumes:
      - ./apps/api/services/identity/config/local.yaml:/app/config/local.yaml:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:sekret@postgres:5432/qrew
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  identity-arq-worker:
    build:
      context: .
      dockerfile: apps/api/services/identity/Dockerfile
    command: ["python", "-m", "com.qode.qrew.v1.identity.worker.arq_worker"]
    volumes:
      - ./apps/api/services/identity/config/local.yaml:/app/config/local.yaml:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:sekret@postgres:5432/qrew
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  entry:
    build:
      context: .
      dockerfile: apps/api/services/entry/Dockerfile
    volumes:
      - ./apps/api/services/entry/config/local.yaml:/app/config/local.yaml:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:sekret@postgres:5432/qrew
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      HOST: 0.0.0.0
      DEBUG: "false"
      TICKETING_URL: http://ticketing:8005
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      ticketing:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8006/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  entry-worker:
    build:
