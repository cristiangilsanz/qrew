services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sekret
      POSTGRES_DB: qrew
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qrew"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:sekret@postgres:5432/qrew
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      HOST: 0.0.0.0
      DEBUG: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  gate:
    build:
      context: .
      dockerfile: services/gate/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ./services/gate/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:sekret@postgres:5432/qrew
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      HOST: 0.0.0.0
      DEBUG: false
      MONOLITH_URL: http://api:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  gate-worker:
    build:
      context: .
      dockerfile: services/gate/Dockerfile
    command: ["python", "-m", "com.qode.qrew.v1.gate.worker"]
    env_file:
      - ./services/gate/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:sekret@postgres:5432/qrew
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  payments:
    build:
      context: .
      dockerfile: services/payments/Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - ./services/payments/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:sekret@postgres:5432/qrew
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      MONOLITH_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  api-worker:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: ["python", "-m", "com.qode.qrew.v1.service.worker"]
    env_file:
      - ./api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:sekret@postgres:5432/qrew
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  nats_data:
