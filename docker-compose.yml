      dockerfile: apps/api/gateway/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api/gateway/config/local.yaml:/app/config/local.yaml:ro
    environment:
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379/0
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: "false"
      IDENTITY_URL: http://identity:8001
      CATALOG_URL: http://catalog:8002
      SALES_URL: http://sales:8003
      PAYMENTS_URL: http://payments:8004
      TICKETING_URL: http://ticketing:8005
      ENTRY_URL: http://entry:8006
    depends_on:
      nats:
        condition: service_healthy
      identity:
        condition: service_healthy
      catalog:
        condition: service_healthy
      ticketing:
        condition: service_healthy
      sales:
        condition: service_healthy
      payments:
        condition: service_healthy
      entry:
        condition: service_healthy
