repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff
        entry: bash -c 'cd api && uv run ruff check --fix --exit-non-zero-on-fix .'
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff-format
        name: ruff format
        entry: bash -c 'cd api && uv run ruff format .'
        language: system
        pass_filenames: false
        always_run: true

      - id: pyright
        name: pyright
        entry: bash -c 'cd api && uv run pyright'
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest
        name: pytest
        entry: bash -c 'cd api && uv run pytest --cov=src --cov-report=term-missing -v'
        language: system
        pass_filenames: false
        always_run: true
