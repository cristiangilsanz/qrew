repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff lint
        entry: uv run ruff check --fix .
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format .
        language: system
        pass_filenames: false
        always_run: true

      - id: eslint-app
        name: eslint (app)
        entry: npm run lint:fix -w apps/app
        language: system
        pass_filenames: false
        files: ^apps/app/

      - id: prettier-app
        name: prettier (app)
        entry: npm run format -w apps/app
        language: system
        pass_filenames: false
        files: ^apps/app/

