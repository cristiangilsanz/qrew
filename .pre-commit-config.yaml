repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff
        entry: bash -c 'cd services/identity && uv run ruff check --fix --exit-non-zero-on-fix .'
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff-format
        name: ruff format
        entry: bash -c 'cd services/identity && uv run ruff format .'
        language: system
        pass_filenames: false
        always_run: true

      - id: pyright
        name: pyright
        entry: bash -c 'cd services/identity && ~/.local/bin/uv run pyright'
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest
        name: pytest
        entry: bash -c 'cd services/identity && uv run pytest -m "not integration" --cov=src --cov-report=term-missing -v; code=$?; [ $code -eq 5 ] && exit 0 || exit $code'
        language: system
        pass_filenames: false
        always_run: true
