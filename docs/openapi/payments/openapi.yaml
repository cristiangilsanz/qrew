openapi: 3.1.0
info:
  title: qrew-payments
  version: 0.1.0
paths:
  /v1/reservations/{reservation_id}/payment:
    post:
      tags:
      - payments
      summary: Create or return the PaymentIntent for a reservation
      operationId: initiate_payment_v1_reservations__reservation_id__payment_post
      security:
      - HTTPBearer: []
      parameters:
      - name: reservation_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Reservation Id
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentInitiateResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ErrorDetail:
      properties:
        message:
          type: string
          title: Message
          description: Human-readable explanation of the failure.
        field:
          anyOf:
          - type: string
          - type: 'null'
          title: Field
      type: object
      required:
      - message
      title: ErrorDetail
    ErrorResponse:
      properties:
        detail:
          $ref: '#/components/schemas/ErrorDetail'
      type: object
      required:
      - detail
      title: ErrorResponse
    PaymentInitiateResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        reservation_id:
          type: string
          format: uuid
          title: Reservation Id
        amount_cents:
          type: integer
          title: Amount Cents
        currency:
          type: string
          title: Currency
        status:
          $ref: '#/components/schemas/PaymentStatus'
        client_secret:
          type: string
          title: Client Secret
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - id
      - reservation_id
      - amount_cents
      - currency
      - status
      - client_secret
      - created_at
      title: PaymentInitiateResponse
    PaymentStatus:
      type: string
      enum:
      - requires_action
      - processing
      - succeeded
      - failed
      - refunded
      title: PaymentStatus
  securitySchemes:
    HTTPBearer:
      type: http
      scheme: bearer
