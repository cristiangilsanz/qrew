components:
  schemas:
    ErrorDetail:
      properties:
        message:
          type: string
          title: Message
          description: Human-readable explanation of the failure.
        field:
          anyOf:
          - type: string
          - type: 'null'
          title: Field
      type: object
      required:
      - message
      title: ErrorDetail
    ErrorResponse:
      properties:
        detail:
          $ref: '#/components/schemas/ErrorDetail'
      type: object
      required:
      - detail
      title: ErrorResponse
    QueueJoinResponse:
      properties:
        position:
          type: integer
          title: Position
      type: object
      required:
      - position
      title: QueueJoinResponse
    QueuePositionResponse:
      properties:
        position:
          anyOf:
          - type: integer
          - type: 'null'
          title: Position
      type: object
      required:
      - position
      title: QueuePositionResponse
    QueueRedeemRequest:
      properties:
        redeem_window_token:
          type: string
          minLength: 1
          title: Redeem Window Token
      type: object
      required:
      - redeem_window_token
      title: QueueRedeemRequest
    QueueRedeemResponse:
      properties:
        reservation_window_token:
          type: string
          title: Reservation Window Token
      type: object
      required:
      - reservation_window_token
      title: QueueRedeemResponse
    ReservationCreateRequest:
      properties:
        ticket_type_id:
          type: string
          format: uuid
          title: Ticket Type Id
        quantity:
          type: integer
          maximum: 20.0
          minimum: 1.0
          title: Quantity
        reservation_window_token:
          anyOf:
          - type: string
            minLength: 1
          - type: 'null'
          title: Reservation Window Token
      type: object
      required:
      - ticket_type_id
      - quantity
      title: ReservationCreateRequest
    ReservationResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        event_id:
          type: string
          format: uuid
          title: Event Id
        ticket_type_id:
          type: string
          format: uuid
          title: Ticket Type Id
        quantity:
          type: integer
          title: Quantity
        status:
          $ref: '#/components/schemas/ReservationStatus'
        expires_at:
          type: string
          format: date-time
          title: Expires At
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - id
      - event_id
      - ticket_type_id
      - quantity
      - status
      - expires_at
      - created_at
      title: ReservationResponse
    ReservationStatus:
      type: string
      enum:
      - reserved
      - paid
      - cancelled
      - expired
      title: ReservationStatus
  securitySchemes:
    HTTPBearer:
      type: http
      scheme: bearer
