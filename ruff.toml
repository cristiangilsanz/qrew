line-length = 88
target-version = "py312"

[lint]
select = [
    "A",
    "ANN",
    "ASYNC",
    "B",
    "C4",
    "E",
    "EM",
    "F",
    "I",
    "N",
    "PL",
    "PT",
    "RET",
    "RUF",
    "S",
    "SIM",
    "TCH",
    "UP",
    "W",
]

ignore = [
    "ANN401",
    "B008",
    "EM101",
    "EM102",
    "PLC0415",  # lazy imports inside try/except for optional dependencies
    "PLR0911",
    "PLR0912",
    "PLR0913",
    "PLR0915",
    "PLW0603",  # global singleton pattern
    "S101",
    "TC001",
    "TC002",
    "TC003",  # Pydantic models use these imports at runtime
    "RUF012",  # SQLAlchemy __table_args__ is handled by the metaclass
]

[lint.per-file-ignores]
"**/tests/**/*.py" = ["ANN", "PLR2004", "S"]
"**/alembic/versions/*.py" = ["E501"]
"**/templates/*.py" = ["E501"]

[lint.isort]
known-first-party = ["com"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
