name: Issue Labeler

on:
  issues:
    types: [opened, edited]

jobs:
  automate-issue:
    name: Fields Compliance
    runs-on: ubuntu-latest
    permissions:
      issues: write
      repository-projects: write
    steps:
      - name: Auto-Assign
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.issues.addAssignees({
              owner, repo,
              issue_number: context.payload.issue.number,
              assignees: ['cristiangilsanz']
            });

      - name: Set Type Label
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = context.payload.issue.number;
            const body = context.payload.issue.body || '';
            const types = ['Build', 'Chore', 'CI', 'Docs', 'Feat', 'Fix', 'Perf', 'Refactor', 'Revert', 'Style', 'Test'];

            const detectedType = types.find(t => new RegExp(`- \\[x\\] ${t}`, 'i').test(body))?.toLowerCase();
            if (!detectedType) return;

            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number: issueNumber });
            await Promise.all(
              currentLabels
                .filter(l => types.some(t => t.toLowerCase() === l.name.toLowerCase()))
                .map(l => github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: l.name }).catch(() => {}))
            );
            await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: [detectedType] });
      
      - name: Set Branch Name
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = context.payload.issue.number;
            const body = context.payload.issue.body || '';
            const types = ['Build', 'Chore', 'CI', 'Docs', 'Feat', 'Fix', 'Perf', 'Refactor', 'Revert', 'Style', 'Test'];

            const detectedType = types.find(t => new RegExp(`- \\[x\\] ${t}`, 'i').test(body))?.toLowerCase() ?? 'task';
            const slug = (context.payload.issue.title || '')
              .toLowerCase()
              .replace(/[^a-z0-9\s]/g, '')
              .trim()
              .replace(/\s+/g, '_');
            const branchName = `${detectedType}/QRW-${issueNumber}_${slug}`;

            const updatedBody = body.replace(
              /(## Branch\s*\n)([\s\S]*?)(\n##|\s*$)/,
              (match, header, _old, tail) => `${header}\`\`\`\n${branchName}\n\`\`\`\n${tail}`
            );

            if (updatedBody === body) return;

            await github.rest.issues.update({ owner, repo, issue_number: issueNumber, body: updatedBody });


      - name: Set Milestone
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const body = context.payload.issue.body || '';
            const milestoneMatch = body.match(/- \[x\] (M\d)/i);
            if (!milestoneMatch) return;

            const { data: milestones } = await github.rest.issues.listMilestones({ owner, repo });
            const target = milestones.find(m => m.title.startsWith(milestoneMatch[1].toUpperCase()));
            if (!target) return;

            await github.rest.issues.update({
              owner, repo,
              issue_number: context.payload.issue.number,
              milestone: target.number
            });

      - name: Set Project
        uses: actions/github-script@v7
        env:
          PROJECT_NUMBER: 1
        with:
          github-token: ${{ secrets.ISSUE_LABELER }}
          script: |
            const owner = 'cristiangilsanz';
            const issueNodeId = context.payload.issue.node_id;
            const projectNumber = parseInt(process.env.PROJECT_NUMBER);

            const result = await github.graphql(`
              query($owner: String!, $number: Int!) {
                user(login: $owner) { projectV2(number: $number) { id } }
              }`, { owner, number: projectNumber }
            ).catch(e => { core.setFailed(`GraphQL error: ${e.message}`); return null; });

            const projectId = result?.user?.projectV2?.id;
            if (!projectId) { core.setFailed(`Project #${projectNumber} not found for user ${owner}.`); return; }

            await github.graphql(`
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) { item { id } }
              }`, { projectId, contentId: issueNodeId }
            );

      - name: Set Issue Start Date
        uses: actions/github-script@v7
        env:
          PROJECT_NUMBER: 1
        with:
          github-token: ${{ secrets.ISSUE_LABELER }}
          script: |
            const owner = 'cristiangilsanz';
            const issueNodeId = context.payload.issue.node_id;
            const projectNumber = parseInt(process.env.PROJECT_NUMBER);
            const today = new Date().toISOString().split('T')[0];

            const result = await github.graphql(`
              query($owner: String!, $number: Int!) {
                user(login: $owner) { projectV2(number: $number) { id fields(first: 20) { nodes { ... on ProjectV2Field { id name } } } } }
              }`, { owner, number: projectNumber }
            ).catch(e => { core.setFailed(`GraphQL error: ${e.message}`); return null; });

            const project = result?.user?.projectV2;
            if (!project) { core.setFailed(`Project #${projectNumber} not found for user ${owner}.`); return; }

            const startField = project.fields.nodes.find(f => f.name === 'Start date');
            if (!startField) { core.setFailed('Start date field not found.'); return; }

            const { addProjectV2ItemById: { item } } = await github.graphql(`
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) { item { id } }
              }`, { projectId: project.id, contentId: issueNodeId }
            );

            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $value: Date!) {
                updateProjectV2ItemFieldValue(input: { projectId: $projectId, itemId: $itemId, fieldId: $fieldId, value: { date: $value } }) { projectV2Item { id } }
              }`, { projectId: project.id, itemId: item.id, fieldId: startField.id, value: today }
            );
