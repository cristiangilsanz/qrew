name: Issue Labeler
on:
  issues:
    types: [opened, edited]

jobs:
  automate-issue:
    name: Fields Compliance
    runs-on: ubuntu-latest
    permissions:
      issues: write
      repository-projects: write
      project: write
    steps:
      - name: Auto-Assign
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.issues.addAssignees({owner, repo, issue_number: context.payload.issue.number, assignees: ['cristiangilsanz']});

      - name: Set Type Label
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issueNumber = context.payload.issue.number;
            const body = context.payload.issue.body || '';
            const types = ['Build', 'Chore', 'CI', 'Docs', 'Feat', 'Fix', 'Perf', 'Refactor', 'Style', 'Test'];
            
            let detectedType = null;
            for (const t of types) {
              const regex = new RegExp(`- \\[x\\] ${t}`, 'i');
              if (regex.test(body)) {
                detectedType = t.toLowerCase();
                break; 
              }
            }

            if (detectedType) {
              const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number: issueNumber });
              for (const label of currentLabels) {
                if (types.some(t => t.toLowerCase() === label.name.toLowerCase())) {
                  await github.rest.issues.removeLabel({ owner, repo, issue_number: issueNumber, name: label.name }).catch(() => {});
                }
              }
              await github.rest.issues.addLabels({ owner, repo, issue_number: issueNumber, labels: [detectedType] });
            }

      - name: Set Milestone
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const body = context.payload.issue.body || '';
            const milestoneMatch = body.match(/- \[x\] (M\d)/i);
            
            if (milestoneMatch) {
              const milestoneKey = milestoneMatch[1].toUpperCase();
              const { data: milestones } = await github.rest.issues.listMilestones({ owner, repo });
              const targetMilestone = milestones.find(m => m.title.startsWith(milestoneKey));
              
              if (targetMilestone) {
                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: context.payload.issue.number,
                  milestone: targetMilestone.number
                });
              }
            }

      - name: Set Project
        uses: actions/github-script@v7
        env:
          PROJECT_NUMBER: 1
        with:
          github-token: ${{ secrets.ISSUE_LABELER }}
          script: |
            const { owner } = context.repo;
            const issueNodeId = context.payload.issue.node_id;
            const projectNumber = parseInt(process.env.PROJECT_NUMBER);

            const projectQuery = await github.graphql(`
              query($owner: String!, $number: Int!) {
                organization(login: $owner) {
                  projectV2(number: $number) { id }
                }
              }`, { owner, number: projectNumber }
            ).catch(() => null);

            const projectId =
              projectQuery?.organization?.projectV2?.id ??
              (await github.graphql(`
                query($owner: String!, $number: Int!) {
                  user(login: $owner) {
                    projectV2(number: $number) { id }
                  }
                }`, { owner, number: projectNumber }
              ).catch(() => null))?.user?.projectV2?.id;

            if (!projectId) {
              core.setFailed(`Project #${projectNumber} not found for ${owner}.`);
              return;
            }

            console.log(`Found project ID: ${projectId}. Adding issue ${issueNodeId}...`);

            const result = await github.graphql(`
              mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: { projectId: $projectId, contentId: $contentId }) {
                  item { id }
                }
              }`, { projectId, contentId: issueNodeId }
            );

            console.log(`Issue successfully added to the project. Item ID: ${result.addProjectV2ItemById.item.id}`);