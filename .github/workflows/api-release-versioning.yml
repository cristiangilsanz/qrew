name: Release Versioning

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    name: API CI
    uses: ./.github/workflows/api-ci.yml

  release-please:
    name: Release Please
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish Docker Images
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      security-events: write
    strategy:
      matrix:
        include:
          - { service: identity,  path: services/identity }
          - { service: entry,     path: services/entry }
          - { service: payments,  path: services/payments }
          - { service: catalog,   path: services/catalog }
          - { service: ticketing, path: services/ticketing }
          - { service: sales,     path: services/sales }
          - { service: audit,     path: services/audit }
          - { service: gateway,   path: gateway }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.path }}/Dockerfile
          load: true
          tags: qrew-${{ matrix.service }}:scan
          cache-to: type=gha,mode=max
          cache-from: type=gha

      - name: Scan Docker Image for Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: qrew-${{ matrix.service }}:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.path }}/Dockerfile
          push: true
          provenance: false
          tags: |
            ghcr.io/${{ github.repository_owner }}/qrew-${{ matrix.service }}:${{ needs.release-please.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/qrew-${{ matrix.service }}:latest
          cache-from: type=gha

  publish-dev:
    name: Publish Dev Docker Images
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    strategy:
      matrix:
        include:
          - { service: identity,  path: services/identity }
          - { service: entry,     path: services/entry }
          - { service: payments,  path: services/payments }
          - { service: catalog,   path: services/catalog }
          - { service: ticketing, path: services/ticketing }
          - { service: sales,     path: services/sales }
          - { service: audit,     path: services/audit }
          - { service: gateway,   path: gateway }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Dev Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.path }}/Dockerfile
          push: true
          provenance: false
          tags: ghcr.io/${{ github.repository_owner }}/qrew-${{ matrix.service }}:dev
          cache-to: type=gha,mode=max
          cache-from: type=gha
