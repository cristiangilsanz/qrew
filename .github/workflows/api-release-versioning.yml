name: Release Versioning

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    name: API CI
    uses: ./.github/workflows/api-ci.yml

  release-please:
    name: Release Please
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.api--release_created }}
      tag_name: ${{ steps.release.outputs.api--tag_name }}
      version: ${{ steps.release.outputs.api--version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .api-release-versioning-manifest.json

  publish:
    name: Publish Docker Image
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image for Scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          load: true
          tags: qrew-api:scan
          cache-to: type=gha,mode=max
          cache-from: type=gha

      - name: Scan Docker Image for Vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: qrew-api:scan
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/qrew-api:${{ needs.release-please.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/qrew-api:latest
          cache-from: type=gha

  publish-dev:
    name: Publish Dev Docker Image
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Dev Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/qrew-api:dev
          cache-to: type=gha,mode=max
          cache-from: type=gha
