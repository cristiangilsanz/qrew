name: API CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: extractions/setup-just@v2
      - run: just install
      - run: just lint-check

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: extractions/setup-just@v2
      - run: just install
      - run: just format-check

  typecheck:
    name: Type Check (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { service: identity,  path: services/identity }
          - { service: entry,     path: services/entry }
          - { service: payments,  path: services/payments }
          - { service: catalog,   path: services/catalog }
          - { service: ticketing, path: services/ticketing }
          - { service: sales,     path: services/sales }
          - { service: audit,     path: services/audit }
          - { service: gateway,   path: gateway }
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --all-packages --all-groups
      - run: cd ${{ matrix.path }} && uv run pyright

  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: audit,        path: services/audit }
          - { name: catalog,      path: services/catalog }
          - { name: entry,        path: services/entry }
          - { name: identity,     path: services/identity }
          - { name: payments,     path: services/payments }
          - { name: sales,        path: services/sales }
          - { name: ticketing,    path: services/ticketing }
          - { name: idempotency,   path: packages/shared-python/idempotency }
          - { name: ratelimit,     path: packages/shared-python/ratelimit }
          - { name: locking,       path: packages/shared-python/locking }
          - { name: pagination,    path: packages/shared-python/pagination }
          - { name: jobs,          path: packages/shared-python/jobs }
          - { name: db,            path: packages/shared-python/db }
          - { name: exceptions,    path: packages/shared-python/exceptions }
          - { name: middleware,    path: packages/shared-python/middleware }
          - { name: observability, path: packages/shared-python/observability }
          - { name: probes,        path: packages/shared-python/probes }
          - { name: security,      path: packages/shared-python/security }
          - { name: auditor,       path: packages/auditor }
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --all-packages --all-groups
      - run: cd ${{ matrix.path }} && uv run pytest tests/unit/ -v
