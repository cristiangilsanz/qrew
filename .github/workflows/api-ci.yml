name: API CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_call:
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: extractions/setup-just@v2
      - run: just install
      - run: just lint-check

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: extractions/setup-just@v2
      - run: just install
      - run: just format-check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --all-packages --all-groups
      - run: cd apps/api/services/identity  && uv run pyright
      - run: cd apps/api/services/entry     && uv run pyright
      - run: cd apps/api/services/payments  && uv run pyright
      - run: cd apps/api/services/catalog   && uv run pyright
      - run: cd apps/api/services/ticketing && uv run pyright
      - run: cd apps/api/services/sales     && uv run pyright
      - run: cd apps/api/services/audit     && uv run pyright
      - run: cd apps/api/gateway            && uv run pyright

  unit-test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --all-packages --all-groups
      - run: cd apps/api/services/audit                       && uv run pytest tests/unit/ -v
      - run: cd apps/api/services/catalog                     && uv run pytest tests/unit/ -v
      - run: cd apps/api/services/entry                       && uv run pytest tests/unit/ -v
      - run: cd apps/api/services/identity                    && uv run pytest tests/unit/ -v
      - run: cd apps/api/services/payments                    && uv run pytest tests/unit/ -v
      - run: cd apps/api/services/sales                       && uv run pytest tests/unit/ -v
      - run: cd apps/api/services/ticketing                   && uv run pytest tests/unit/ -v
      - run: cd packages/shared-python/idempotency            && uv run pytest tests/unit/ -v
      - run: cd packages/shared-python/ratelimit              && uv run pytest tests/unit/ -v
      - run: cd packages/shared-python/locking                && uv run pytest tests/unit/ -v
      - run: cd packages/shared-python/pagination             && uv run pytest tests/unit/ -v
      - run: cd packages/shared-python/jobs                   && uv run pytest tests/unit/ -v
      - run: cd packages/shared-python/db                     && uv run pytest tests/unit/ -v
      - run: cd packages/shared-python/exceptions             && uv run pytest tests/unit/ -v
      - run: cd packages/shared-python/middleware             && uv run pytest tests/unit/ -v
      - run: cd packages/shared-python/observability          && uv run pytest tests/unit/ -v
      - run: cd packages/shared-python/probes                 && uv run pytest tests/unit/ -v
      - run: cd packages/shared-python/security               && uv run pytest tests/unit/ -v
      - run: cd packages/shared-python/auditor                && uv run pytest tests/unit/ -v
      - run: cd apps/api/gateway                              && uv run pytest tests/unit/ -v

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    env:
      TESTCONTAINERS_RYUK_DISABLED: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --all-packages --all-groups
      - run: cd apps/api/services/identity  && uv run pytest tests/integration/ -m integration -v
      - run: cd apps/api/services/catalog   && uv run pytest tests/integration/ -m integration -v
      - run: cd apps/api/services/sales     && uv run pytest tests/integration/ -m integration -v
      - run: cd apps/api/services/payments  && uv run pytest tests/integration/ -m integration -v
      - run: cd apps/api/services/ticketing && uv run pytest tests/integration/ -m integration -v
      - run: cd apps/api/services/entry     && uv run pytest tests/integration/ -m integration -v
      - run: cd apps/api/services/audit     && uv run pytest tests/integration/ -m integration -v
      - run: cd apps/api/gateway            && uv run pytest tests/integration/ -m integration -v
