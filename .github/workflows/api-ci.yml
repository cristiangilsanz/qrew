name: API CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_call:

jobs:
  lint:
    name: Run Linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: extractions/setup-just@v2
      - run: just install
      - run: just lint-check

  format:
    name: Run Formatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: extractions/setup-just@v2
      - run: just install
      - run: just format-check

  typecheck:
    name: Run Type Checker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: extractions/setup-just@v2
      - run: just install
      - run: just type-check

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: sekret
          POSTGRES_DB: qrew
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: extractions/setup-just@v2
      - run: just install
      - run: just db-upgrade
      - run: just test
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml
