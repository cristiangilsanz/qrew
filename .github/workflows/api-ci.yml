name: API CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: extractions/setup-just@v2
      - run: just install
      - run: just lint-check

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
      - uses: extractions/setup-just@v2
      - run: just install
      - run: just format-check

  typecheck:
    name: Type Check (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [identity, entry, payments, catalog, ticketing, sales, audit, gateway]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync --all-packages --all-groups
      - run: cd services/${{ matrix.service }} && uv run pyright
